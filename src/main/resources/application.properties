# Servidor
server.port=8080
server.forward-headers-strategy=framework
spring.profiles.default=dev

# Base de datos MySQL
# Clever Cloud inyecta MYSQL_ADDON_* automaticamente al vincular el add-on.
# En desarrollo local se usan los valores por defecto.
spring.datasource.url=jdbc:mysql://${MYSQL_ADDON_HOST:localhost}:${MYSQL_ADDON_PORT:3306}/${MYSQL_ADDON_DB:mayosalud}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires&zeroDateTimeBehavior=convertToNull
spring.datasource.username=${MYSQL_ADDON_USER:root}
spring.datasource.password=${MYSQL_ADDON_PASSWORD:utn123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones — plan gratuito de Clever Cloud limita a 5 conexiones por usuario
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Mensajes de validacion
spring.messages.encoding=UTF-8

# Internacionalizacion
spring.web.locale=es_AR

# Sesion: expirar a los 30 minutos de inactividad
server.servlet.session.timeout=30m
mayosalud.cors.allowed-origins=${MAYOSALUD_CORS_ALLOWED_ORIGINS:https://clinicamayolapaz.com.ar}

# Email — recordatorios automáticos
# Configurar en produccion con variables de entorno o application-prod.properties:
#   MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
# Para Gmail: MAIL_USERNAME=correo@gmail.com, MAIL_PASSWORD=<contraseña de aplicación>
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Recordatorios: se envían cada día a las 08:00 (zona Argentina)
# Para deshabilitar en desarrollo: RECORDATORIO_HABILITADO=false
recordatorio.habilitado=${RECORDATORIO_HABILITADO:true}
recordatorio.cron=${RECORDATORIO_CRON:0 0 8 * * *}
recordatorio.remitente=${spring.mail.username:}
