# Servidor
server.port=8080

# Base de datos MySQL
# Clever Cloud inyecta MYSQL_ADDON_* automaticamente al vincular el add-on.
# En desarrollo local se usan los valores por defecto.
spring.datasource.url=jdbc:mysql://${MYSQL_ADDON_HOST:localhost}:${MYSQL_ADDON_PORT:3306}/${MYSQL_ADDON_DB:mayosalud}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=${MYSQL_ADDON_USER:root}
spring.datasource.password=${MYSQL_ADDON_PASSWORD:utn123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Mensajes de validacion
spring.messages.encoding=UTF-8

# Internacionalizacion
spring.web.locale=es_AR

# Sesion: expirar a los 30 minutos de inactividad
server.servlet.session.timeout=30m
