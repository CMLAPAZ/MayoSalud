# Servidor
server.port=8080

# Base de datos MySQL
# En desarrollo usa valores locales; en produccion (Render) leer variables de entorno
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mayosalud?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:utn123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Mensajes de validacion
spring.messages.encoding=UTF-8

# Internacionalizacion
spring.web.locale=es_AR

# Sesion: expirar a los 30 minutos de inactividad
server.servlet.session.timeout=30m
