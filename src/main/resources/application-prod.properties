# Produccion: configurar siempre por variables de entorno.
spring.datasource.password=${MYSQL_ADDON_PASSWORD}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.thymeleaf.cache=true

mayosalud.admin.username=${MAYOSALUD_ADMIN_USERNAME:}
mayosalud.admin.password=${MAYOSALUD_ADMIN_PASSWORD:}
mayosalud.admin.nombre=${MAYOSALUD_ADMIN_NOMBRE:Administrador del Sistema}

server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
