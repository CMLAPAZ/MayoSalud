<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Médicos')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-person-badge me-2"></i>Médicos</h4>
        <a href="/medicos/nuevo" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Nuevo médico
        </a>
    </div>

    <div class="card mb-3">
        <div class="card-body py-2">
            <form method="get" action="/medicos" class="d-flex gap-2">
                <input type="text" name="buscar" class="form-control" placeholder="Buscar por nombre o apellido..."
                       th:value="${buscar}"/>
                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-search"></i></button>
                <a href="/medicos" class="btn btn-outline-secondary" th:if="${buscar != null}"><i class="bi bi-x"></i></a>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" th:if="${!medicos.isEmpty()}">
                <thead class="table-light">
                    <tr>
                        <th>Apellido y Nombre</th><th>DNI</th><th>Matrícula</th>
                        <th>Especialidad</th><th>Teléfono</th><th>Estado</th><th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="medico : ${medicos}">
                        <td th:text="${medico.apellido + ', ' + medico.nombre}"></td>
                        <td th:text="${medico.dni}"></td>
                        <td th:text="${medico.matricula}"></td>
                        <td th:text="${medico.especialidad.descripcion}"></td>
                        <td th:text="${medico.telefono}"></td>
                        <td>
                            <span th:if="${medico.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${medico.activo}" class="badge bg-secondary">Inactivo</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/medicos/editar/{id}(id=${medico.id})}" class="btn btn-sm btn-outline-secondary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/medicos/baja/{id}(id=${medico.id})}" method="post" class="d-inline"
                                  th:if="${medico.activo}"
                                  onsubmit="return confirm('¿Confirma dar de baja a este médico?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-person-x"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${medicos.isEmpty()}" class="text-center text-muted py-5">
                <i class="bi bi-person-badge fs-1 d-block mb-2"></i>No se encontraron médicos.
            </div>
        </div>
    </div>
</main>
</body>
</html>
