<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar sesión - MayoSalud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        *, body { font-family: 'Inter', sans-serif; font-size: 14px; }
        body {
            background: linear-gradient(135deg, #1E3A4F 0%, #2C5F82 60%, #5B8DB8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card { border: none; border-radius: 18px; box-shadow: 0 16px 48px rgba(0,0,0,.25); overflow: hidden; }
        .login-header {
            background: linear-gradient(135deg, #2C5F82, #5B8DB8);
            color: #fff;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }
        .login-header img { height: 72px; background:#fff; border-radius:10px; padding:6px; margin-bottom: .75rem; }
        .login-header h5 { font-weight: 700; letter-spacing: .5px; margin-bottom: .1rem; }
        .login-header small { opacity: .75; }
        .card-body { padding: 2rem; }
        .btn-primary { background-color: #2C5F82; border-color: #2C5F82; font-weight: 500; }
        .btn-primary:hover { background-color: #1E3A4F; border-color: #1E3A4F; }
        .form-control:focus { border-color: #5B8DB8; box-shadow: 0 0 0 .2rem rgba(91,141,184,.25); }
        .input-group-text { background: #f4f7fa; border-color: #dee2e6; color: #2C5F82; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 col-sm-8">
            <div class="card login-card">
                <div class="login-header">
                    <div class="d-flex align-items-center justify-content-center gap-3 mb-1">
                        <img src="/images/logo.png" alt="Logo"/>
                        <i class="bi bi-heart-pulse-fill" style="font-size:2.5rem; opacity:.8;"></i>
                    </div>
                    <h5>MayoSalud</h5>
                    <small class="d-block">Plataforma de Gestión Clínica</small>
                    <small class="d-block">Clínica Mayo S.R.L.</small>
                </div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger py-2 small">
                        <i class="bi bi-exclamation-triangle me-1"></i> Usuario o contraseña incorrectos.
                    </div>
                    <div th:if="${param.bloqueado}" class="alert alert-danger py-2 small">
                        <i class="bi bi-lock-fill me-1"></i> Cuenta bloqueada por múltiples intentos fallidos. Intentá nuevamente en 15 minutos.
                    </div>
                    <div th:if="${param.timeout}" class="alert alert-warning py-2 small">
                        <i class="bi bi-clock me-1"></i> Tu sesión expiró por inactividad. Por favor ingresá nuevamente.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info py-2 small">
                        <i class="bi bi-check-circle me-1"></i> Sesión cerrada correctamente.
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="usuario" required autofocus/>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" id="passwordInput" class="form-control" placeholder="contraseña" required/>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                        aria-label="Mostrar contraseña" title="Mostrar contraseña">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/politica-privacidad" class="text-muted" style="font-size:.75rem; text-decoration:none;">
                            <i class="bi bi-shield-lock me-1"></i>Política de privacidad
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    (function () {
        var input = document.getElementById('passwordInput');
        var button = document.getElementById('togglePassword');
        if (!input || !button) return;

        button.addEventListener('click', function () {
            var visible = input.type === 'text';
            input.type = visible ? 'password' : 'text';
            button.setAttribute('aria-label', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
            button.setAttribute('title', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
            button.innerHTML = visible ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
        });
    })();
</script>
</body>
</html>
