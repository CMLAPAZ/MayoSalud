<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Ficha clínica - Pacientes')}">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0"><i class="bi bi-clipboard2-pulse me-2"></i>Ficha clínica - Pacientes</h4>
            <small class="text-muted">Acceso restringido a roles clínicos.</small>
        </div>
    </div>

    <div th:if="${clinicaFiltradaMedico}" class="alert alert-info py-2 mb-3">
        <i class="bi bi-person-badge me-1"></i>
        <span th:if="${medicoAgenda != null}">
            Mostrando solo pacientes con turnos vinculados a <strong th:text="${medicoAgenda.nombreCompleto}"></strong>.
        </span>
        <span th:if="${medicoAgenda == null}">
            Tu usuario medico no tiene un profesional asociado. Contacta a administracion.
        </span>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/clinica/pacientes}" method="get" class="row g-2 align-items-center">
                <div class="col-md-8">
                    <input class="form-control" type="text" name="buscar" placeholder="Buscar por DNI / nombre"
                           th:value="${buscar}">
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-search me-1"></i> Buscar
                    </button>
                    <a th:href="@{/clinica/pacientes}" class="btn btn-outline-secondary" th:if="${buscar != null}">
                        <i class="bi bi-x me-1"></i> Limpiar
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" th:if="${!pacientes.isEmpty()}" >
                <thead class="table-light">
                <tr>
                    <th>Paciente</th>
                    <th>DNI</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pacientes}">
                    <td th:text="${p.nombreCompleto}"></td>
                    <td th:text="${p.dni}"></td>
                    <td class="text-end">
                        <a th:href="@{/clinica/pacientes/ver/{id}(id=${p.id})}" class="btn btn-sm btn-primary">
                            <i class="bi bi-eye me-1"></i> Ver ficha
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${pacientes == null || pacientes.isEmpty()}" class="text-center text-muted py-4">
                <i class="bi bi-people d-block mb-2 opacity-25" style="font-size:2rem"></i>
                No hay pacientes.
            </div>
        </div>
    </div>
</main>
</body>
</html>
