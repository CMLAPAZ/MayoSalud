<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Paciente')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex align-items-center mb-4">
        <a href="/pacientes" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0" th:text="${paciente.nombreCompleto}"></h4>
        <a th:href="@{/pacientes/editar/{id}(id=${paciente.id})}" class="btn btn-outline-secondary ms-3">
            <i class="bi bi-pencil me-1"></i> Editar
        </a>
        <a th:href="@{/turnos/nuevo(pacienteId=${paciente.id})}" class="btn btn-primary ms-2">
            <i class="bi bi-calendar-plus me-1"></i> Nuevo turno
        </a>
    </div>

    <div class="row g-3">
        <div class="col-md-5">
            <div class="card h-100">
                <div class="card-header bg-transparent fw-semibold">Datos del paciente</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5 text-muted">DNI</dt>
                        <dd class="col-7" th:text="${paciente.dni}"></dd>
                        <dt class="col-5 text-muted">Fecha nac.</dt>
                        <dd class="col-7" th:text="${#temporals.format(paciente.fechaNacimiento, 'dd/MM/yyyy')}"></dd>
                        <dt class="col-5 text-muted">Sexo</dt>
                        <dd class="col-7" th:text="${paciente.sexo}"></dd>
                        <dt class="col-5 text-muted">Teléfono</dt>
                        <dd class="col-7" th:text="${paciente.telefono}"></dd>
                        <dt class="col-5 text-muted">Email</dt>
                        <dd class="col-7" th:text="${paciente.email}"></dd>
                        <dt class="col-5 text-muted">Dirección</dt>
                        <dd class="col-7" th:text="${paciente.direccion}"></dd>
                        <dt class="col-5 text-muted">Obra Social</dt>
                        <dd class="col-7" th:text="${paciente.obraSocial?.descripcion}"></dd>
                        <dt class="col-5 text-muted">Nro. Afiliado</dt>
                        <dd class="col-7" th:text="${paciente.nroAfiliado}"></dd>
                    </dl>
                    <div th:if="${paciente.antecedentes}" class="mt-3">
                        <div class="text-muted small fw-semibold mb-1">Antecedentes / Alergias</div>
                        <div class="bg-light rounded p-2 small" th:text="${paciente.antecedentes}"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-transparent fw-semibold">Historial de turnos</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" th:if="${!turnos.isEmpty()}">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha</th><th>Hora</th><th>Médico</th><th>Estado</th><th>Observaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="turno : ${turnos}">
                                <td th:text="${#temporals.format(turno.fecha, 'dd/MM/yyyy')}"></td>
                                <td th:text="${#temporals.format(turno.hora, 'HH:mm')}"></td>
                                <td th:text="${turno.medico.nombreCompleto}"></td>
                                <td>
                                    <span class="badge" th:classappend="'badge-estado-' + ${turno.estado.name()}"
                                          th:text="${turno.estado.descripcion}"></span>
                                </td>
                                <td th:text="${turno.observaciones}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${turnos.isEmpty()}" class="text-center text-muted py-4">
                        <i class="bi bi-calendar-x d-block mb-1"></i>Sin turnos registrados.
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
