<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Pacientes')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Pacientes</h4>
            <small class="text-muted">Datos administrativos del paciente. Esta sección no contiene evolución clínica ni registros asistenciales.</small>
        </div>
        <a href="/pacientes/nuevo" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Nuevo paciente
        </a>
    </div>

    <div class="card mb-3">
        <div class="card-body py-2">
            <form method="get" action="/pacientes" class="d-flex gap-2">
                <input type="text" name="buscar" class="form-control" placeholder="Buscar por nombre o apellido..."
                       th:value="${buscar}"/>
                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-search"></i></button>
                <a href="/pacientes" class="btn btn-outline-secondary" th:if="${buscar != null}"><i class="bi bi-x"></i></a>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" th:if="${!pacientes.isEmpty()}">
                <thead class="table-light">
                    <tr>
                        <th>Apellido y Nombre</th><th>DNI</th><th>Obra Social</th>
                        <th>Nro. Afiliado</th><th>Teléfono</th><th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="paciente : ${pacientes}">
                        <td>
                            <a th:href="@{/pacientes/ver/{id}(id=${paciente.id})}"
                               th:text="${paciente.apellido + ', ' + paciente.nombre}"
                               class="text-decoration-none fw-semibold"></a>
                        </td>
                        <td th:text="${paciente.dni}"></td>
                        <td th:text="${paciente.obraSocial?.descripcion}"></td>
                        <td th:text="${paciente.nroAfiliado}"></td>
                        <td th:text="${paciente.telefono}"></td>
                        <td class="text-end">
                            <a th:href="@{/pacientes/ver/{id}(id=${paciente.id})}" class="btn btn-sm btn-outline-info me-1">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/pacientes/editar/{id}(id=${paciente.id})}" class="btn btn-sm btn-outline-secondary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/turnos/nuevo(pacienteId=${paciente.id})}" class="btn btn-sm btn-outline-primary me-1" title="Nuevo turno">
                                <i class="bi bi-calendar-plus"></i>
                            </a>
                            <form th:action="@{/pacientes/baja/{id}(id=${paciente.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Confirma dar de baja a este paciente?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-person-x"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${pacientes.isEmpty()}" class="text-center text-muted py-5">
                <i class="bi bi-people fs-1 d-block mb-2"></i>No se encontraron pacientes.
            </div>
        </div>
    </div>
</main>
</body>
</html>
