<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Horario médico')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex align-items-center mb-4">
        <a th:href="${horario.medico != null ? '/horarios-medicos/medico/' + horario.medico.id : '/horarios-medicos'}"
           class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0"
            th:text="${horario.id != null ? 'Editar horario de atención' : 'Nuevo horario de atención'}"></h4>
    </div>

    <div class="card" style="max-width:560px;">
        <div class="card-body">
            <form th:action="@{/horarios-medicos/guardar}" method="post" th:object="${horario}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-semibold">Médico *</label>
                        <select class="form-select" th:field="*{medico.id}"
                                th:classappend="${#fields.hasErrors('medico')} ? 'is-invalid'">
                            <option value="">-- Seleccionar médico --</option>
                            <option th:each="m : ${medicos}" th:value="${m.id}"
                                    th:text="${m.nombreCompleto + ' - ' + m.especialidad.descripcion}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{medico}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Día de semana *</label>
                        <select class="form-select" th:field="*{diaSemana}"
                                th:classappend="${#fields.hasErrors('diaSemana')} ? 'is-invalid'">
                            <option value="">-- Seleccionar día --</option>
                            <option th:each="entry : ${diasEspanol}"
                                    th:value="${entry.key.name()}"
                                    th:text="${entry.value}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{diaSemana}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Hora desde *</label>
                        <input type="time" class="form-control" th:field="*{horaDesde}"
                               th:classappend="${#fields.hasErrors('horaDesde')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{horaDesde}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Hora hasta *</label>
                        <input type="time" class="form-control" th:field="*{horaHasta}"
                               th:classappend="${#fields.hasErrors('horaHasta')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{horaHasta}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Duración base del turno</label>
                        <select class="form-select" th:field="*{duracionBaseMinutos}">
                            <option th:each="d : ${duracionesPermitidas}"
                                    th:value="${d}"
                                    th:text="${d + ' minutos'}"></option>
                        </select>
                        <div class="form-text">Referencia para la agenda; el recepcionista puede elegir otra duración al crear el turno.</div>
                    </div>

                    <div class="col-md-6 d-flex align-items-center pt-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{activo}" id="activoCheck"/>
                            <label class="form-check-label fw-semibold" for="activoCheck">Activo</label>
                        </div>
                    </div>

                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy me-1"></i> Guardar
                    </button>
                    <a th:href="${horario.medico != null ? '/horarios-medicos/medico/' + horario.medico.id : '/horarios-medicos'}"
                       class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
