<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Feriado')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex align-items-center mb-4">
        <a href="/feriados" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0" th:text="${feriado.id != null ? 'Editar feriado' : 'Nuevo feriado'}"></h4>
    </div>
    <div class="card" style="max-width:520px;">
        <div class="card-body">
            <form th:action="@{/feriados/guardar}" method="post" th:object="${feriado}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Fecha *</label>
                        <input type="date" class="form-control" th:field="*{fecha}"
                               th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{fecha}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Nombre *</label>
                        <input type="text" class="form-control" th:field="*{nombre}"
                               placeholder="Ej: Día de la Independencia"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{nombre}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Tipo *</label>
                        <select class="form-select" th:field="*{tipo}"
                                th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'">
                            <option th:each="t : ${tipos}" th:value="${t.name()}"
                                    th:text="${t.descripcion}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{tipo}"></div>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy me-1"></i> Guardar
                    </button>
                    <a href="/feriados" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
