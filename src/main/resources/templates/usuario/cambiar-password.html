<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Cambiar contraseña')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex align-items-center mb-4">
        <a href="/usuarios" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0">
            <i class="bi bi-key me-2"></i>Cambiar contraseña
        </h4>
    </div>

    <div class="card" style="max-width:420px;">
        <div class="card-body">
            <p class="text-muted mb-3">
                Cambiando contraseña de:
                <strong th:text="${usuario.nombreCompleto}"></strong>
                <span class="text-muted font-monospace">(<span th:text="${usuario.username}"></span>)</span>
            </p>

            <div th:if="${errorPassword}" class="alert alert-danger py-2 mb-3">
                <i class="bi bi-exclamation-triangle me-1"></i>
                <span th:text="${errorPassword}"></span>
            </div>

            <form th:action="@{/usuarios/cambiar-password/{id}(id=${usuario.id})}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nueva contraseña *</label>
                    <input type="password" class="form-control" name="passwordNuevo"
                           placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirmar contraseña *</label>
                    <input type="password" class="form-control" name="passwordConfirm"
                           placeholder="Repetir contraseña" autocomplete="new-password"/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy me-1"></i> Guardar contraseña
                    </button>
                    <a href="/usuarios" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
