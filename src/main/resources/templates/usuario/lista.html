<!DOCTYPE html>
<html lang="es" th:replace="~{layout :: layout(~{::main}, 'Usuarios')}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-people-fill me-2"></i>Usuarios del sistema</h4>
        <a th:href="@{/usuarios/nuevo}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Nuevo usuario
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nombre completo</th>
                        <th style="width:130px">Usuario</th>
                        <th>Email</th>
                        <th style="width:130px">Rol</th>
                        <th style="width:90px">Estado</th>
                        <th style="width:140px">Creado</th>
                        <th style="width:140px">Último acceso</th>
                        <th style="width:130px"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}"
                        th:class="${!u.activo ? 'table-secondary text-muted' : ''}">
                        <td class="fw-semibold" th:text="${u.nombreCompleto}"></td>
                        <td class="font-monospace small" th:text="${u.username}"></td>
                        <td class="small text-muted" th:text="${u.email != null ? u.email : '—'}"></td>
                        <td>
                            <span th:class="${u.rol.name() == 'ADMIN'    ? 'badge bg-primary'   :
                                             u.rol.name() == 'RECEPCION' ? 'badge bg-info text-dark' :
                                                                           'badge bg-secondary'}"
                                  th:text="${u.rol.descripcion}"></span>
                        </td>
                        <td>
                            <span th:class="${u.activo ? 'badge bg-success' : 'badge bg-danger'}"
                                  th:text="${u.activo ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                        <td class="small text-muted"
                            th:text="${u.fechaCreacion != null ? #temporals.format(u.fechaCreacion, 'dd/MM/yyyy') : '—'}"></td>
                        <td class="small text-muted"
                            th:text="${u.ultimoAcceso != null ? #temporals.format(u.ultimoAcceso, 'dd/MM/yyyy HH:mm') : 'Nunca'}"></td>
                        <td class="text-end">
                            <a th:href="@{/usuarios/editar/{id}(id=${u.id})}"
                               class="btn btn-sm btn-outline-secondary me-1" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/usuarios/cambiar-password/{id}(id=${u.id})}"
                               class="btn btn-sm btn-outline-secondary me-1" title="Cambiar contraseña">
                                <i class="bi bi-key"></i>
                            </a>
                            <form th:action="@{/usuarios/toggle-activo/{id}(id=${u.id})}" method="post" class="d-inline">
                                <button type="submit"
                                        th:class="${u.activo ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'}"
                                        th:title="${u.activo ? 'Desactivar usuario' : 'Activar usuario'}">
                                    <i th:class="${u.activo ? 'bi bi-person-slash' : 'bi bi-person-check'}"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${usuarios.isEmpty()}" class="text-center text-muted py-5">
                <i class="bi bi-people fs-1 d-block mb-2 opacity-25"></i>
                No hay usuarios registrados.
            </div>
        </div>
    </div>

    <p class="text-muted small mt-3">
        <i class="bi bi-info-circle me-1"></i>
        Los usuarios no se pueden eliminar para preservar el historial. Usá
        <i class="bi bi-person-slash"></i> para desactivarlos.
    </p>
</main>
</body>
</html>
